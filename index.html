<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔢</text></svg>" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doxiny - Do X in Y moves</title>
  <meta name="description" content="Mathematical puzzle game - Do X in Y moves. Transform numbers using 4 operations to reach your goal!">
  <meta name="theme-color" content="#2563EB">
  <link rel="manifest" href="./manifest.json">
  <!-- Tailwind CSS v3 CDN -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      theme: {
        screens: {
          'sm': '175px',
          'md': '768px',
          'lg': '1024px',
          'xl': '1280px',
          '2xl': '1536px',
        }
      }
    }
  </script>
  <style data-purpose="custom-shadows">
    .glow-orange {
      box-shadow: 0 0 15px rgba(249, 115, 22, 0.4);
    }
    .glow-active {
      box-shadow: 0 0 20px rgba(249, 115, 22, 0.6);
    }
    .current-number.updated {
      transform: scale(1.05);
      transition: all 0.3s ease;
    }
    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-20px); }
      60% { transform: translateY(-10px); }
    }
    .celebration-emoji {
      animation: bounce 1s ease-in-out infinite;
    }
    @media (prefers-reduced-motion: reduce) {
      *, .celebration-emoji {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body class="bg-[#1a1f26] text-white font-sans h-screen overflow-hidden flex flex-col items-center p-2">
  <div id="app" class="w-full max-w-sm sm:max-w-md h-full flex flex-col items-center"></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
